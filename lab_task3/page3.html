<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Profile Validation</title>
</head>
<body>
    <form id="profileForm">
        <b>8</b> <hr>
        <table border="1" style="width :500px"> 
            <th colspan="3"><h2>Personal Profile</h2></th>
            
            <tr>
                <td style="width:100px">Name</td>
                <td style="width:200px"><input type="text" id="name" style="width: 200px;"></td>
                <td style="width:100px">  </td>
            </tr>
            
            <tr>
                <td style="width:100px">EMAIL</td>
                <td style="width:200px"><input type="text" id="email" style="width: 200px;"></td>
                <td style="width:100px">  </td>
            </tr>
            
            <tr>
                <td style="width:100px">Gender</td>
                <td style="width:200px">
                    <input type="radio" name="gender" value="male"> Male
                    <input type="radio" name="gender" value="Female"> Female
                    <input type="radio" name="gender" value="other"> Other 
                </td>
                <td style="width:100px">  </td>
            </tr>
            
            <tr>
                <td style="width:100px">Date of Birth</td>
                <td style="width:200px">
                    <input type="text" name="dd" size="1"> /
                    <input type="text" name="mm" size="1"> /
                    <input type="text" name="yyyy" size="1"> / 
                    (dd/mm/yyyy)
                </td>
                <td style="width:100px">  </td>
            </tr>

            <tr>
                <td style="width:100px">Blood Group</td>
                <td style="width:200px">
                    <select name="blood" id="blood">
                        <option value="">Select...</option>
                        <option value="A+">A+</option>
                        <option value="o+">o+</option>
                        <option value="a-">a-</option>
                    </select>
                </td>
                <td style="width:100px">  </td>
            </tr>

            <tr>
                <td style="width:100px">Degree</td>
                <td style="width:200px">
                    <input type="checkbox" name="ssc" value="ssc"> SSC
                    <input type="checkbox" name="Hsc" value="Hsc"> HSC
                    <input type="checkbox" name="bsc" value="bsc"> BSC 
                    <input type="checkbox" name="msc" value="msc"> MSC 
                </td>
                <td style="width:100px">  </td>
            </tr>

            <tr>
                <td style="width:100px">User ID</td>
                <td style="width:200px">
                    <input type="text" id="uid" style="width: 200px;">
                </td>
                <td style="width:100px">  </td>
            </tr>

            <tr>
                <td style="width:100px">Photo</td>
                <td style="width:200px">
                    <input type="file" name="file" id="file" text="browse.."> <br>
                </td>
                <td style="width:100px">  </td>
            </tr>
            
            <tr>
                <td colspan="3" style="width: 500px;height: 20px;"></td>
            </tr>
            
            <tr>
                <td colspan="3" align="right">
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset">
                </td>
            </tr>
        </table>
    </form>
    
    <script>
        document.getElementById("profileForm").addEventListener("submit", function(event) {
            event.preventDefault();

            let name = document.getElementById("name").value.trim();
            if (name === "") {
                alert("Name cannot be empty.");
                return;
            }
            let firstChar = name.charAt(0);
            if (!((firstChar >= 'a' && firstChar <= 'z') || (firstChar >= 'A' && firstChar <= 'Z'))) {
                alert("Name must start with a letter.");
                return;
            }
            if (name.split(" ").length < 2) {
                alert("Name must contain at least two words.");
                return;
            }
            if (!/^[a-zA-Z.\- ]+$/.test(name)) {
                alert("Name can only contain letters, dots, or dashes.");
                return;
            }

            let email = document.getElementById("email").value.trim();
            if (email === "") {
                alert("Email cannot be empty.");
                return;
            }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                alert("Please enter a valid email address.");
                return;
            }

            let male = document.querySelector('input[value="male"]').checked;
            let female = document.querySelector('input[value="Female"]').checked;
            let other = document.querySelector('input[value="other"]').checked;
            if (!male && !female && !other) {
                alert("Please select a Gender.");
                return;
            }

            let bloodGroup = document.getElementById("blood").value;
            if (bloodGroup === "") {
                alert("Please select a Blood Group.");
                return;
            }

            let ssc = document.getElementsByName("ssc")[0].checked;
            let hsc = document.getElementsByName("Hsc")[0].checked;
            let bsc = document.getElementsByName("bsc")[0].checked;
            let msc = document.getElementsByName("msc")[0].checked;
            if (!ssc && !hsc && !bsc && !msc) {
                alert("Please select at least one Degree.");
                return;
            }

            let uid = document.getElementById("uid").value.trim();
            let file = document.getElementById("file").value;

            if (uid === "") {
                alert("User ID cannot be empty.");
                return;
            }
            if (isNaN(uid) || Number(uid) <= 0) {
                alert("User ID must be a positive number.");
                return;
            }
            if (file === "") {
                alert("Picture cannot be empty. Please upload a file.");
                return;
            }

            alert("Success! All form validations passed.");
        });
    </script>
</body>
</html>
